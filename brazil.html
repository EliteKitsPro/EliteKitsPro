<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Morocco Jersey</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="product-page">

  <h1>Morocco Jersey</h1>
  <p>€29.99</p>

  <img id="mainImg" src="https://github.com/EliteKitsPro/EliteKitsPro/blob/main/IMG_0482.jpeg?raw=true">

  <!-- VARIANTS -->
  <div class="variants">
    <button onclick="setImg('home')">Home</button>
    <button onclick="setImg('away')">Away</button>
  </div>

  <!-- SIZES -->
  <div class="variants">
    <button onclick="setSize('S')">S</button>
    <button onclick="setSize('M')">M</button>
    <button onclick="setSize('L')">L</button>
    <button onclick="setSize('XL')">XL</button>
  </div>

  <button onclick="addToCart('Morocco Jersey (' + size + ')', 29.99)">
    Add to Cart
  </button>

</div>

<script>
let size = "M";

function setSize(s){
  size = s;
}

function setImg(type){
  let img = document.getElementById("mainImg");

  if(type === "home"){
    img.src = "https://github.com/EliteKitsPro/EliteKitsPro/blob/main/IMG_0482.jpeg?raw=true";
  }

  if(type === "away"){
    img.src = "https://github.com/EliteKitsPro/EliteKitsPro/blob/main/IMG_0485.jpeg?raw=true";
  }
}
</script>

<!-- CART SCRIPT (IMPORTANT) -->
<script>
function addToCart(name, price){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.push({name, price: Number(price)});
  localStorage.setItem("cart", JSON.stringify(cart));
}
</script>

</body>
</html>
