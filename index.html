<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EliteKitsPro</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- CART -->
<div class="cart">
  <h2>🛒 Cart</h2>
  <ul id="cart-items"></ul>
  <p id="total">Total: €0</p>
</div>

<!-- HERO -->
<header class="hero">
  <h1>ELITEKITS</h1>
  <p>Premium Football Drops</p>
</header>

<!-- PRODUCTS -->
<section class="products">

  <div class="card">
    <h3>Morocco Home Kit</h3>
    <p>€80</p>
    <button onclick="addToCart('Morocco Home Kit', 80)">
      Add to Cart
    </button>
  </div>

  <div class="card">
    <h3>Brazil Windbreaker</h3>
    <p>€120</p>
    <button onclick="addToCart('Brazil Windbreaker', 120)">
      Add to Cart
    </button>
  </div>

</section>

<script src="script.js"></script>

</body>
</html>
