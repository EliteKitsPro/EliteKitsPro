<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EliteKitsPro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="hero">
  <h1>EliteKitsPro</h1>
  <p>Football Kits Store</p>
</div>

<!-- CART -->
<div class="cart">
  <h3>Cart</h3>
  <div id="cartItems"></div>
  <p id="cartTotal">Total: €0</p>
</div>

<div class="products">

  <div class="card" onclick="location.href='morocco.html'">
    <img src="https://github.com/EliteKitsPro/EliteKitsPro/blob/main/IMG_0482.jpeg?raw=true">
    <h3>Morocco Jersey</h3>
    <p>€29.99</p>
  </div>

  <div class="card" onclick="location.href='brazil.html'">
    <img src="https://github.com/EliteKitsPro/EliteKitsPro/blob/main/IMG_0488.jpeg?raw=true">
    <h3>Brazil Windbreaker</h3>
    <p>€49.99</p>
  </div>

</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function addToCart(name, price){
  cart.push({ name, price: Number(price) });
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

function renderCart(){
  let html = "";
  let total = 0;

  cart.forEach(item => {
    html += "<p>" + item.name + " - €" + Number(item.price).toFixed(2) + "</p>";
    total += Number(item.price);
  });

  document.getElementById("cartItems").innerHTML = html;
  document.getElementById("cartTotal").innerText = "Total: €" + total.toFixed(2);
}

renderCart();
</script>

</body>
</html>
