<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EliteKitsPro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<div class="nav">
  <h2>EliteKitsPro</h2>
  <div class="nav-right">
    <button onclick="openCart()">Cart 🛒 (<span id="cart-count">0</span>)</button>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>NEW DROPS</h1>
  <p>Football Kits & Streetwear Resell</p>
</div>

<!-- PRODUCTS -->
<div class="products">

  <!-- MOROCCO -->
  <div class="card">
    <img src="https://raw.githubusercontent.com/Adot-alt/EliteKitsPro/main/IMG_0478.jpeg">
    <h3>Morocco 2026 Home Jersey</h3>
    <p>€43</p>

    <div class="btn-row">
      <button onclick="addToCart('Morocco Jersey', 43)">Add to Cart</button>
      <button onclick="buyNow('Morocco Jersey')">Buy Now</button>
    </div>
  </div>

  <!-- BRAZIL -->
  <div class="card">
    <img src="https://raw.githubusercontent.com/Adot-alt/EliteKitsPro/main/IMG_0475.jpeg">
    <h3>Brazil Windbreaker</h3>
    <p>€55</p>

    <div class="btn-row">
      <button onclick="addToCart('Brazil Windbreaker', 55)">Add to Cart</button>
      <button onclick="buyNow('Brazil Windbreaker')">Buy Now</button>
    </div>
  </div>

</div>

<!-- CART -->
<div class="cart" id="cart">
  <h3>Your Cart</h3>
  <div id="cart-items"></div>
  <p>Total: €<span id="total">0</span></p>
  <button onclick="checkout()">Checkout</button>
</div>

<script>
let cart = [];
let total = 0;

function addToCart(name, price) {
  cart.push({name, price});
  total += price;

  document.getElementById("cart-count").innerText = cart.length;
  updateCart();
}

function updateCart() {
  let box = document.getElementById("cart-items");
  box.innerHTML = "";

  cart.forEach(item => {
    let div = document.createElement("div");
    div.innerHTML = item.name + " - €" + item.price;
    box.appendChild(div);
  });

  document.getElementById("total").innerText = total;
}

function openCart() {
  document.getElementById("cart").classList.toggle("show");
}

function buyNow(item) {
  alert("Buying " + item + " (demo mode)");
}

function checkout() {
  alert("Checkout system coming soon 🔥");
}
</script>

</body>
</html>
