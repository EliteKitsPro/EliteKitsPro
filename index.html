<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EliteKitsPro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: black;
      color: white;
    }

    header {
      text-align: center;
      padding: 40px 20px;
    }

    header img {
      width: 140px;
    }

    h1 {
      margin: 10px 0;
      letter-spacing: 2px;
    }

    p {
      color: #aaa;
    }

    .products {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      padding: 40px 20px;
    }

    .card {
      background: #111;
      width: 240px;
      border-radius: 12px;
      overflow: hidden;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
    }

    .info {
      padding: 15px;
      text-align: center;
    }

    .price {
      color: #aaa;
      margin-top: 5px;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 15px;
      border: 1px solid white;
      color: white;
      text-decoration: none;
      font-size: 12px;
    }

    .btn:hover {
      background: white;
      color: black;
    }

    footer {
      text-align: center;
      padding: 30px;
      color: #555;
      border-top: 1px solid #222;
      margin-top: 30px;
    }
  </style>
</head>

<body>

  <!-- LOGO -->
  <header>
    <img src="https://raw.githubusercontent.com/Adot-alt/EliteKitsPro/main/FCD243C7-0E73-47F2-850C-54955D844359.png">
    <h1>EliteKitsPro</h1>
    <p>Reselling Football Jerseys & Streetwear Gear</p>
  </header>

  <!-- PRODUCTS -->
  <div class="products">

    <!-- MOROCCO HOME -->
    <div class="card">
      <img src="https://via.placeholder.com/400x300">
      <div class="info">
        <h3>Morocco 2026 World Cup Jersey (Home)</h3>
        <div class="price">€43</div>
        <a class="btn" href="#">Buy</a>
      </div>
    </div>

    <!-- BRAZIL WINDBREAKER -->
    <div class="card">
      <img src="https://via.placeholder.com/400x300">
      <div class="info">
        <h3>Brazil Windbreaker</h3>
        <div class="price">€55</div>
        <a class="btn" href="#">Buy</a>
      </div>
    </div>

  </div>

  <footer>
    © 2026 EliteKitsPro • Resell Store
  </footer>

</body>
</html>
